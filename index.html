<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
    <meta name="theme-color" content="#9ad59a" />
    <title>כאוס חתונה: עופר נגד מושו</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main id="app" aria-label="המשחק כאוס חתונה">

      <!-- Audio preload screen — hidden by JS once all assets are cached -->
      <div id="loadingUI" class="loadingUI" aria-live="polite" aria-label="טוען את המשחק">
        <div class="loadingUI-box">
          <div class="loadingUI-deco" aria-hidden="true">💍 🐕‍🦺 💍</div>
          <h1 class="loadingUI-title">כאוס חתונה</h1>
          <p class="loadingUI-hint">טוען...</p>
          <div class="loadingUI-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" id="loadingTrack">
            <div id="loadingBar" class="loadingUI-fill"></div>
          </div>
        </div>
      </div>

      <canvas id="game" aria-label="משטח המשחק"></canvas>

      <!-- IDLE UI: header → demo panel → footer -->
      <section id="startUI" class="overlay overlay--start" aria-label="מסך פתיחה">
        <header class="startUI-header">
          <div class="startUI-deco" aria-hidden="true">💍 🐕‍🦺 💍</div>
          <h1 class="startUI-title">כאוס חתונה</h1>
          <p class="startUI-tagline">תפסו את מושו לפני שתתחיל החופה!</p>
        </header>

        <div id="startUI-demoPanel" class="startUI-demoPanel" aria-label="נסו את המשחק">
          <div id="startUI-timerWrap" class="startUI-timerWrap" aria-hidden="true"></div>
          <div id="startUI-demoViewport" class="startUI-demoViewport" aria-hidden="true">
            <!-- Canvas is moved here in IDLE so demo is clipped to panel -->
          </div>
          <div class="startUI-demoPanel-inner">
            <span class="demoHint demoHint--inside">הזיזו את הג׳ויסטיק ותפסו את מושו</span>
          </div>
          <span class="startUI-finger" aria-hidden="true">👇</span>
        </div>

        <div class="startUI-footer">
          <div id="devNav" class="devNav" aria-label="ניווט לפיתוח">
            <span class="devNav-label">פיתוח:</span>
            <button type="button" id="devStage1">שלב 1</button>
            <button type="button" id="devStage2">שלב 2</button>
            <button type="button" id="devStage3">שלב 3</button>
            <button type="button" id="devCelebration">חגיגה</button>
            <button type="button" id="introSceneBtn">סצנה לפני שלב 1</button>
            <button type="button" id="introScene2Btn">סצנה לפני שלב 2</button>
            <button type="button" id="introScene3Btn">סצנה לפני שלב 3</button>
          </div>
          <div class="tiny">מובייל בלבד • מומלץ מצב לאורך</div>
        </div>
      </section>

      <!-- HUD (in-game UI) -->
      <div id="hud" class="hud" aria-label="תצוגת משחק">
        <button id="devBackToStart" class="devBackBtn isHidden" type="button">חזרה למסך כניסה</button>
        <div id="hudRow" class="hudRow">
          <div id="timer" class="pill">30.0</div>
        </div>
        <div id="chaos" class="pill pill--chaos isHidden" aria-live="polite"></div>
        <div id="quip" class="quip" aria-live="polite"></div>
      </div>

      <!-- On-screen joystick (movement) -->
      <section id="joystick" class="joystick isHidden" aria-label="ג׳ויסטיק תנועה">
        <div id="joystickBase" class="joystickBase" aria-hidden="true">
          <div id="joystickKnob" class="joystickKnob"></div>
        </div>
      </section>

      <!-- END UI -->
      <section id="endUI" class="overlay overlay--center isHidden" aria-label="מסך סיום">
        <div class="panel panel--end">
          <div class="endUIMessages" aria-label="תוצאה">
            <div id="endTitle" class="title">תוצאות הכאוס</div>
            <div id="endText" class="subtitle"></div>
          </div>
          <div class="endUIFooter">
            <div id="endScore" class="scoreBox" aria-label="ניקוד"></div>
            <button id="restartBtn" class="bigBtn" type="button">עוד פעם</button>
          </div>
        </div>
      </section>

      <section id="celebrationUI" class="celebrationUI isHidden" aria-label="חגיגת סיום אינטראקטיבית">
        <div class="celebrationBottomStack">
          <div id="celebrationResultDock" class="celebrationResultDock">
            <button
              id="celebrationResultBtn"
              class="celebrationStackBtn celebrationStackBtn--warm"
              type="button"
              aria-expanded="false"
              aria-controls="celebrationResultDrawer"
            >
              <span class="celebrationStackBtn__label">תוצאה</span>
              <span id="celebrationResultBadge" class="celebrationStackBtn__sub">0 נק׳</span>
            </button>
            <aside id="celebrationResultDrawer" class="celebrationResultPanel" aria-live="polite">
              <div id="celebrationResultTitle" class="celebrationResultTitle">החתונה ניצלה</div>
              <div id="celebrationResultSummary" class="celebrationResultSummary"></div>
              <div id="celebrationScore" class="scoreBox celebrationScoreBox" aria-label="תוצאה סופית"></div>
            </aside>
          </div>

          <button id="celebrationRestartBtn" class="celebrationStackBtn celebrationStackBtn--restart" type="button">להתחיל מחדש</button>
        </div>
      </section>

      <!-- Stage intro / between stages -->
      <section id="stageUI" class="overlay overlay--center isHidden" aria-label="מסך שלב">
        <div class="panel">
          <div id="stageTitle" class="title">שלב</div>
          <div id="stageText" class="subtitle stageText"></div>
          <div id="stageCountdown" class="countdown" aria-live="polite"></div>
          <div id="stageTiny" class="tiny"></div>
        </div>
      </section>

      <section id="cutsceneUI" class="cutsceneUI isHidden" aria-label="סצנת מעבר" aria-live="polite">
        <div id="cutsceneBanner" class="pill pill--chaos cutsceneBanner">
          <div id="cutsceneText" class="cutsceneBanner__text"></div>
        </div>
      </section>

      <!-- Landscape warning -->
      <section id="rotateUI" class="overlay overlay--center isHidden" aria-label="סיבוב מכשיר">
        <div class="panel">
          <div class="title">רק מצב לאורך</div>
          <div class="subtitle">תחזירו לאורך. החתונה גם ככה לא יציבה.</div>
        </div>
      </section>
    </main>

    <script src="game.js"></script>
  </body>
</html>
